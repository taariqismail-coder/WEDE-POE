<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Submit beat enquiry or collaboration request to Riqos Production.">
    <title>Enquiry | Riqos Production</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <div class="title">Submit Enquiry</div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a class="active" href="enquiry.html">Enquiry</a></li>
        </ul>
    </nav>

    <section>
        <h2 class="title">Beat / Collaboration Enquiry</h2>
        <form id="enquiryForm">
            <input type="text" id="artistName" placeholder="Artist / Producer Name" required>
            <input type="email" id="email" placeholder="Email Address" required>
            <select id="serviceType" required>
                <option value="">Select Service</option>
                <option value="beat">Custom Beat</option>
                <option value="mix">Mixing & Mastering</option>
                <option value="video">Music Video</option>
                <option value="full">Full Package</option>
            </select>
            <textarea id="message" rows="6" placeholder="Describe your project..." required></textarea>
            
            <button type="submit" class="btn">Submit Enquiry</button>
        </form>
    </section>

    <footer>© 2026 Riqos Productions</footer>

    <script>
        document.getElementById('enquiryForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            if (!email.includes('@')) {
                alert("Please enter a valid email!");
                return;
            }
            alert("Enquiry submitted successfully! We'll respond shortly.");
            this.reset();
        });
    </script>
</body>
</html>
