<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Enquiry | Riqos Productions</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <div class="logo">RIQOS PROD</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a class="active" href="enquiry.html">Enquiry</a></li>
        </ul>
    </nav>

    <section>
        <h2 class="section-title reveal">BOOK A SESSION</h2>

        <form id="bookingForm">
            <label for="name">Artist Name</label>
            <input id="name" placeholder="Your name">

            <label for="email">Email Address</label>
            <input id="email" type="email" placeholder="you@example.com">

            <label for="service">Service</label>
            <select id="service">
                <option value="800">Beat Production</option>
                <option value="500">Mixing & Mastering</option>
                <option value="3000">Music Video</option>
                <option value="7000">Artist Development</option>
            </select>

            <label for="hours">Session Type</label>
            <select id="hours">
                <option value="0">Quick Session</option>
                <option value="400">Standard Session</option>
                <option value="900">Full Day Session</option>
            </select>

            <label for="details">Project Details</label>
            <textarea id="details" placeholder="Describe your project in detail"></textarea>

            <div class="price-box">
                Estimated Price: <span id="price">R0</span>
            </div>

            <div class="form-msg" id="formMsg"></div>

            <button type="button" class="btn" onclick="calculateBooking()">Calculate</button>
            <button type="button" class="btn ghost" onclick="sendBooking('whatsapp')">Send WhatsApp</button>
            <button type="button" class="btn ghost" onclick="sendBooking('email')">Send Email</button>
        </form>
    </section>

    <footer>© 2026 Riqos Productions</footer>

    <script src="Js/scrpt.js"></script>
</body>
</html>
